<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto | DayByDay Consulting</title>
  <meta name="description" content="Contacta con DayByDay Consulting. Paid media, automation y growth para eCommerce D2C.">
  <meta name="robots" content="index, follow">
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/modern.css">
  <style>
    :root { --bg-primary: #050507; --bg-secondary: #0e0e11; --text-primary: #fafafa; --text-secondary: #a1a1a6; --border: #27272a; }
  </style>
</head>
<body>
  <nav class="main-nav">
    <a href="/" class="nav-logo">DayByDay</a>
    <ul class="nav-links">
      <li><a href="/problema.html">Problema</a></li>
      <li><a href="/servicios.html">Servicios</a></li>
      <li><a href="/blog.html">Blog</a></li>
    </ul>
  </nav>
  <div style="height:64px;"></div>

  <section class="hero" style="padding: 6rem 0 3rem;">
    <div class="container">
      <h1 style="font-size: clamp(2.5rem, 5vw, 3.5rem); font-weight: 800; margin-bottom: 1rem;">Hablamos</h1>
      <p class="subtitle">Cuéntanos sobre tu proyecto. Te respondemos en menos de 24 horas.</p>
    </div>
  </section>

  <section class="section">
    <div class="container" style="max-width: 600px;">
      <form style="background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; padding: 2rem;">
        <div style="margin-bottom: 1.5rem;">
          <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Nombre</label>
          <input type="text" placeholder="Tu nombre" style="width: 100%; padding: 0.75rem; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 1rem;">
        </div>
        <div style="margin-bottom: 1.5rem;">
          <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Email</label>
          <input type="email" placeholder="tu@email.com" style="width: 100%; padding: 0.75rem; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 1rem;">
        </div>
        <div style="margin-bottom: 1.5rem;">
          <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Empresa</label>
          <input type="text" placeholder="Tu empresa" style="width: 100%; padding: 0.75rem; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 1rem;">
        </div>
        <div style="margin-bottom: 1.5rem;">
          <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Presupuesto mensual en ads</label>
          <select style="width: 100%; padding: 0.75rem; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 1rem;">
            <option>Menos de 1K€</option>
            <option>1K€ - 3K€</option>
            <option>3K€ - 5K€</option>
            <option>5K€ - 10K€</option>
            <option>Más de 10K€</option>
          </select>
        </div>
        <div style="margin-bottom: 1.5rem;">
          <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Mensaje</label>
          <textarea placeholder="Cuéntanos sobre tu proyecto..." rows="5" style="width: 100%; padding: 0.75rem; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 1rem; resize: vertical;"></textarea>
        </div>
        <button type="submit" style="width: 100%; padding: 1rem; background: var(--text-primary); color: var(--bg-primary); font-weight: 600; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem;">Enviar mensaje</button>
      </form>
    </div>
  </section>

  <section class="section section-dark">
    <div class="container" style="text-align: center;">
      <h2 style="font-size: 1.5rem; margin-bottom: 1rem;">O escríbenos directamente</h2>
      <p style="color: var(--text-secondary); margin-bottom: 1rem;">
        <a href="mailto:contact@daybydayconsulting.com" style="color: var(--text-primary);">contact@daybydayconsulting.com</a>
      </p>
      <p style="color: var(--text-secondary);">
        <a href="https://calendly.com/daybydayconsulting/discovery" style="color: var(--text-primary);">Reserva una llamada en Calendly</a>
      </p>
    </div>
  </section>

  <footer class="footer">
    <a href="/">Inicio</a>
    <a href="/servicios.html">Servicios</a>
    <a href="/blog.html">Blog</a>
    <p>© 2026 DayByDay Consulting</p>
  </footer>
</body>
</html>
