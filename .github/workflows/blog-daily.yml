name: Blog publish

# Publica un post: corre los 6 gates (rewrite-batch), renderiza, actualiza
# sitemap/llms, lanza IndexNow y hace push a main. Si un gate falla, el job
# falla y NO se publica nada.
#
# Disparado por n8n Stage 5 via workflow_dispatch con input slug.
# Tambien ejecutable a mano desde la UI de GitHub como fallback.

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slug del post a publicar (content/<slug>.md)'
        required: true

permissions:
  contents: write

concurrency:
  group: blog-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Run gates + render + index
        run: |
          set -e
          echo "Publishing slug: ${{ inputs.slug }}"
          node scripts/rewrite-batch.mjs ${{ inputs.slug }}

      - name: Update blog listing pages
        run: node scripts/update-blog-index.mjs ${{ inputs.slug }}

      - name: Commit and push
        run: |
          git config user.name "DayByDay Bot"
          git config user.email "bot@daybyday.local"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "ci(blog): publish ${{ inputs.slug }} via rewrite-batch (run ${{ github.run_id }})"
            git push origin main
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Blog publish" >> "$GITHUB_STEP_SUMMARY"
          echo "- Slug: ${{ inputs.slug }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run: ${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
